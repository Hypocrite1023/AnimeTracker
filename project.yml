name: AnimeTracker
options:
  bundleIdPrefix: hypocrite1023
  deploymentTarget:
    iOS: "16.0"

# 1. 定義第三方套件 (SPM)
packages:
  SnapKit:
    url: https://github.com/SnapKit/SnapKit.git
    from: 5.7.1
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher.git
    from: 8.8.0
  Lottie:
    url: https://github.com/airbnb/lottie-ios.git
    from: 4.6.0
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 12.10.0
  CombineCocoa:
    url: https://github.com/CombineCommunity/CombineCocoa.git
    from: 0.4.1
  CombineExt:
    url: https://github.com/CombineCommunity/CombineExt.git
    from: 1.9.0
  SkeletonUI:
    url: https://github.com/CSolanaM/SkeletonUI.git
    from: 2.0.2
  LookinServer:
    url: https://github.com/QMUI/LookinServer.git
    from: 1.2.8

# 2. 定義 Target
targets:
  AnimeTracker:
    type: application
    platform: iOS
    sources:
      - path: AnimeTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: hypocrite1023.AnimeTracker
        INFOPLIST_FILE: AnimeTracker/Info.plist
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
    configFiles:
        Debug: AnimeTracker-Debug.xcconfig
        Release: AnimeTracker-Release.xcconfig

    # 3. 綁定第三方套件 (SPM)
    dependencies:
      - package: SnapKit
      - package: Kingfisher
      - package: Lottie
        product: Lottie
      - package: CombineCocoa
      - package: CombineExt
      - package: SkeletonUI
      - package: LookinServer
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore

  # 4. 測試 Target
  AnimeTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AnimeTrackerTests
    dependencies:
      - target: AnimeTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: Hypocrite.AnimeTrackerTests

  AnimeTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AnimeTrackerUITests
    dependencies:
      - target: AnimeTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: Hypocrite.AnimeTrackerUITests
